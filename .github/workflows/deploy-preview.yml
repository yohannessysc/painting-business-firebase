name: Deploy Preview Channel

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    concurrency:
      group: preview-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write Firebase service account key
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EPS_YK_2026 }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_EPS_YK_2026 secret"
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Install and build web app
        run: |
          cd apps/web
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting preview channel
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          PROJECT_ID: eps-yk-2026
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          CHANNEL_ID=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9-]#-#g' | cut -c1-40)
          echo "Deploying preview channel: $CHANNEL_ID"
          firebase hosting:channel:deploy "$CHANNEL_ID" --project "$PROJECT_ID" --expires 7d

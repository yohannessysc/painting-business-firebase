<div class="page-bg" aria-hidden="true"></div>

<div class="topbar-shell">
  <header class="topbar">
    <nav class="nav-links" aria-label="Primary">
      <a routerLink="/" [routerLinkActive]="'is-active'" [routerLinkActiveOptions]="{ exact: true }" (click)="closeServicesMenu()">Home</a>
      <div class="nav-services" [class.is-open]="servicesMenuOpen" (click)="keepServicesMenuOpen($event)">
        <button type="button" class="nav-services-trigger" (click)="toggleServicesMenu($event)">Services</button>
        <div class="nav-services-menu" [class.is-open]="servicesMenuOpen">
          <a routerLink="/services" routerLinkActive="is-active" (click)="closeServicesMenu()">Painting</a>
          <a routerLink="/cleaning" routerLinkActive="is-active" (click)="closeServicesMenu()">Cleaning</a>
        </div>
      </div>
      <a routerLink="/process" routerLinkActive="is-active" (click)="closeServicesMenu()">Process</a>
      <a routerLink="/projects" routerLinkActive="is-active" (click)="closeServicesMenu()">Projects</a>
      <a routerLink="/contact" routerLinkActive="is-active" (click)="closeServicesMenu()">Contact</a>
    </nav>
    <a class="brand" routerLink="/" aria-label="Evolution Painting Solutions home" (click)="closeServicesMenu()">
      <img src="/images/contemporary-logo.png" alt="Evolution Painting Solutions logo" (error)="handleLogoError($event)" />
    </a>
    <div class="topbar-cta">
      <a class="call-now" [href]="callHref">{{ contactPhone }}</a>
      <a class="email-link" [href]="'mailto:' + contactEmail">Email Us</a>
    </div>
  </header>
</div>

<main class="content-wrap">
  <router-outlet></router-outlet>
</main>

<div class="mobile-quick-cta" aria-label="Quick contact actions">
  <a class="mobile-quick-cta__call" [href]="callHref">Call {{ contactPhone }}</a>
  <a class="mobile-quick-cta__quote" routerLink="/contact">Get Quote</a>
</div>

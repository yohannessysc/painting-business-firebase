<div class="page-bg" aria-hidden="true"></div>

<div class="topbar-shell">
  <header class="topbar">
    <nav class="nav-links" aria-label="Primary">
      <a routerLink="/" [routerLinkActive]="'is-active'" [routerLinkActiveOptions]="{ exact: true }" (click)="closeServicesMenu(servicesMenu)">Home</a>
      <details class="nav-services" #servicesMenu>
        <summary>Services</summary>
        <div class="nav-services-menu">
          <a routerLink="/services" routerLinkActive="is-active" (click)="closeServicesMenu(servicesMenu)">Painting</a>
          <a routerLink="/cleaning" routerLinkActive="is-active" (click)="closeServicesMenu(servicesMenu)">Cleaning</a>
        </div>
      </details>
      <a routerLink="/process" routerLinkActive="is-active" (click)="closeServicesMenu(servicesMenu)">Process</a>
      <a routerLink="/projects" routerLinkActive="is-active" (click)="closeServicesMenu(servicesMenu)">Projects</a>
      <a routerLink="/contact" routerLinkActive="is-active" (click)="closeServicesMenu(servicesMenu)">Contact</a>
    </nav>
    <a class="brand" routerLink="/" aria-label="Evolution Painting Solutions home" (click)="closeServicesMenu(servicesMenu)">
      <img src="/images/contemporary-logo.png" alt="Evolution Painting Solutions logo" (error)="handleLogoError($event)" />
    </a>
    <div class="topbar-cta">
      <a class="call-now" [href]="callHref">{{ contactPhone }}</a>
      <a class="email-link" [href]="'mailto:' + contactEmail">Email Us</a>
    </div>
  </header>
</div>

<main class="content-wrap">
  <router-outlet></router-outlet>
</main>

<div class="mobile-quick-cta" aria-label="Quick contact actions">
  <a class="mobile-quick-cta__call" [href]="callHref">Call {{ contactPhone }}</a>
  <a class="mobile-quick-cta__quote" routerLink="/contact">Get Quote</a>
</div>
